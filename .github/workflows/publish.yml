name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish, for example v0.1.4"
        required: true
        type: string

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Verify tag matches package version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag_ref="${{ inputs.tag }}"
          else
            tag_ref="${GITHUB_REF_NAME}"
          fi
          tag_version="${tag_ref#v}"
          package_version="$(uv version --short)"
          if [ "$tag_version" != "$package_version" ]; then
            echo "Git tag version ($tag_version) does not match package version ($package_version)."
            exit 1
          fi

      - name: Build distributions
        run: uv build --no-sources

      - name: Smoke test wheel
        run: uv run --isolated --no-project --with dist/*.whl python tests/smoke_test.py

      - name: Smoke test source distribution
        run: uv run --isolated --no-project --with dist/*.tar.gz python tests/smoke_test.py

      - name: Publish to PyPI
        run: uv publish
